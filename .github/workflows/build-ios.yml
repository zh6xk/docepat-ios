name: Build iOS App for Simulator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build Simulator .app
        run: |
          cd ios
          xcodebuild -workspace DOCEPAT.xcworkspace -scheme DOCEPAT -configuration Debug -sdk iphonesimulator -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Package to .zip
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../DOCEPAT_Simulator.zip DOCEPAT.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOCEPAT-iOS-Simulator
          path: DOCEPAT_Simulator.zip
